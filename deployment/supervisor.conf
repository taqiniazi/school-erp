[program:school-erp-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/school-erp/artisan queue:work sqs --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=forge
numprocs=8
redirect_stderr=true
stdout_logfile=/var/www/school-erp/storage/logs/worker.log
stopwaitsecs=3600
